version: "3.8"

services:
  cron:
    image: crazymax/swarm-cronjob:1.14.0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=UTC
    deploy:
      mode: global

  prune-nodes:
    image: docker:27.3.1-cli
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    command: ["docker", "system", "prune", "--all", "--force"]
    deploy:
      mode: global
      labels:
        - "swarm.cronjob.enable=true"
        - "swarm.cronjob.schedule=25 * * * *"
        - "swarm.cronjob.skip-running=false"
      restart_policy:
        condition: none

  mongo-rs-1:
    image: mongo:8.2.3
    command:
      [
        "bash",
        "-c",
        "echo $MONGO_RS_KEYFILE_CONTENT > /data/keyfile && chmod 400 /data/keyfile && chown 999:999 /data/keyfile && docker-entrypoint.sh mongod --replSet rs0 --keyFile /data/keyfile --bind_ip_all",
      ]
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${PASSWORD}
      - MONGO_RS_KEYFILE_CONTENT=${MONGO_RS_KEYFILE_CONTENT}
    volumes:
      - mongodb-rs-1-data:/data/db
    networks:
      - mongo-rs-net
    deploy:
      restart_policy:
        condition: on-failure

  mongo-rs-init:
    image: mongo:8.2.3
    links:
      - mongo-rs-1
    command:
      - bash
      - -c
      - |
        echo "Waiting for mongo-rs-1 to be ready..."
        until mongosh --host mongo-rs-1 --eval "print(\"waited for connection\")"; do sleep 2; done
        echo "Initializing Replica Set..."
        mongosh --host mongo-rs-1 -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --eval 'try { rs.status() } catch (err) { rs.initiate({_id: "rs0", members: [{_id: 0, host: "mongo-rs-1:27017"}]}) }'
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${PASSWORD}
    networks:
      - mongo-rs-net
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 5

  mongo-rs-viewer:
    image: haohanyang/compass-web:0.3.1
    environment:
      - CW_MONGO_URI=mongodb://${USERNAME}:${PASSWORD}@mongo-rs-1:27017/?replicaSet=rs0&authSource=admin
      - CW_BASIC_AUTH_USERNAME=${USERNAME}
      - CW_BASIC_AUTH_PASSWORD=${PASSWORD}
    networks:
      - mongo-rs-net
      - reverse-proxy
    deploy:
      restart_policy:
        condition: on-failure

  mongo-rs-backup-daily:
    image: ghcr.io/${OWNER_NAME}/mongo-rs-backup:${GIT_COMMIT_SHA}
    command: ["/usr/local/bin/backup.sh"]
    depends_on:
      - cron
      - mongo-rs-1
    environment:
      - S3_ENDPOINT=${S3_ENDPOINT}
      - MONGO_URI=mongodb://${USERNAME}:${PASSWORD}@mongo-rs-1:27017/?replicaSet=rs0&authSource=admin
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_FOLDER=mongo-rs-daily
    networks:
      - mongo-rs-net
    deploy:
      mode: replicated
      replicas: 0
      labels:
        - "swarm.cronjob.enable=true"
        - "swarm.cronjob.schedule=30 3 * * *"
        - "swarm.cronjob.skip-running=true"
      restart_policy:
        condition: none

  mongo-rs-backup-weekly:
    image: ghcr.io/${OWNER_NAME}/mongo-rs-backup:${GIT_COMMIT_SHA}
    command: ["/usr/local/bin/backup.sh"]
    depends_on:
      - cron
      - mongo-rs-1
    environment:
      - S3_ENDPOINT=${S3_ENDPOINT}
      - MONGO_URI=mongodb://${USERNAME}:${PASSWORD}@mongo-rs-1:27017/?replicaSet=rs0&authSource=admin
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_FOLDER=mongo-rs-weekly
    networks:
      - mongo-rs-net
    deploy:
      mode: replicated
      replicas: 0
      labels:
        - "swarm.cronjob.enable=true"
        - "swarm.cronjob.schedule=20 3 * * 2"
        - "swarm.cronjob.skip-running=true"
      restart_policy:
        condition: none

  postgres-1:
    image: postgres:17.4
    environment:
      - POSTGRES_USER=${USERNAME}
      - POSTGRES_PASSWORD=${PASSWORD}
    volumes:
      - postgres-1-data:/var/lib/postgresql/data
    networks:
      - postgres-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      restart_policy:
        condition: on-failure

  postgres-viewer:
    image: dpage/pgadmin4:latest
    environment:
      - PGADMIN_DEFAULT_EMAIL=${USERNAME}@nu31.space
      - PGADMIN_DEFAULT_PASSWORD=${PASSWORD}
      - PGADMIN_LISTEN_PORT=80
    networks:
      - postgres-net
      - reverse-proxy
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s

  pgweb-oauth-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    command:
      - --provider=github
      - --github-org=nu31hackerspace
      - --upstream=http://postgres-viewer:80/
      - --http-address=0.0.0.0:4180
      - --redirect-url=https://pgweb.nu31.space/oauth2/callback
      - --email-domain=*
      - --cookie-secure=true
      - --cookie-domain=pgweb.nu31.space
      - --cookie-name=_oauth2_proxy_pgweb
    environment:
      - OAUTH2_PROXY_CLIENT_ID=${PGWEB_GITHUB_CLIENT_ID}
      - OAUTH2_PROXY_CLIENT_SECRET=${PGWEB_GITHUB_CLIENT_SECRET}
      - OAUTH2_PROXY_COOKIE_SECRET=${PGWEB_OAUTH2_COOKIE_SECRET}
    networks:
      - reverse-proxy
      - postgres-net
    deploy:
      restart_policy:
        condition: on-failure

  postgres-backup-daily:
    image: ghcr.io/${OWNER_NAME}/postgres-backup:${GIT_COMMIT_SHA}
    command: ["/usr/local/bin/backup.sh"]
    depends_on:
      - cron
      - postgres-1
    environment:
      - S3_ENDPOINT=${S3_ENDPOINT}
      - PGHOST=postgres-1
      - PGPORT=5432
      - PGUSER=${USERNAME}
      - PGPASSWORD=${PASSWORD}
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_FOLDER=postgres-daily
    networks:
      - postgres-net
    deploy:
      mode: replicated
      replicas: 0
      labels:
        - "swarm.cronjob.enable=true"
        - "swarm.cronjob.schedule=40 3 * * *"
        - "swarm.cronjob.skip-running=true"
      restart_policy:
        condition: none

  postgres-backup-weekly:
    image: ghcr.io/${OWNER_NAME}/postgres-backup:${GIT_COMMIT_SHA}
    command: ["/usr/local/bin/backup.sh"]
    depends_on:
      - cron
      - postgres-1
    environment:
      - S3_ENDPOINT=${S3_ENDPOINT}
      - PGHOST=postgres-1
      - PGPORT=5432
      - PGUSER=${USERNAME}
      - PGPASSWORD=${PASSWORD}
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_FOLDER=postgres-weekly
    networks:
      - postgres-net
    deploy:
      mode: replicated
      replicas: 0
      labels:
        - "swarm.cronjob.enable=true"
        - "swarm.cronjob.schedule=30 3 * * 2"
        - "swarm.cronjob.skip-running=true"
      restart_policy:
        condition: none

  caddy-backup-daily:
    image: ghcr.io/${OWNER_NAME}/caddy-backup:${GIT_COMMIT_SHA}
    command: ["/usr/local/bin/backup.sh"]
    depends_on:
      - cron
      - caddy
    environment:
      - S3_ENDPOINT=${S3_ENDPOINT}
      - CADDY_DATA_DIR=/caddy_storage
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_FOLDER=caddy-daliy
    volumes:
      - caddy-data:/caddy_storage
    deploy:
      mode: replicated
      replicas: 0
      labels:
        - "swarm.cronjob.enable=true"
        - "swarm.cronjob.schedule=0 5 * * *"
        - "swarm.cronjob.skip-running=true"
      restart_policy:
        condition: none

  caddy:
    image: ghcr.io/${OWNER_NAME}/caddy:${GIT_COMMIT_SHA}
    dns:
      - 1.1.1.1
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "8080:8080"
      - "80:80"
      - "443:443"
    volumes:
      - caddy-data:/caddy_storage
    environment:
      - TZ=UTC
      - GRAFANA_HOST=${GRAFANA_HOST}
    deploy:
      update_config:
        order: start-first
      restart_policy:
        condition: on-failure
    networks:
      - reverse-proxy

  grafana:
    image: ghcr.io/${OWNER_NAME}/grafana:${GIT_COMMIT_SHA}
    links:
      - mongo-rs-1
      - postgres-1
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - TZ=UTC
      - GF_SECURITY_ADMIN_USER=${USERNAME}
      - GF_SECURITY_ADMIN_PASSWORD=${PASSWORD}
      - GF_SERVER_ROOT_URL=https://grafana.nu31.space
      - GF_AUTH_GITHUB_API_URL=https://api.github.com/user
      - GF_AUTH_GITHUB_ALLOWED_ORGANIZATIONS=["nu31hackerspace"]
      - GF_USERS_AUTO_ASSIGN_ORG_ROLE=Editor
    deploy:
      update_config:
        order: start-first
      restart_policy:
        condition: on-failure
    networks:
      - reverse-proxy
      - mongo-rs-net
      - postgres-net

  grafana-backup-daily:
    image: ghcr.io/${OWNER_NAME}/grafana-backup:${GIT_COMMIT_SHA}
    command: ["/usr/local/bin/backup.sh"]
    depends_on:
      - cron
      - grafana
    environment:
      - S3_ENDPOINT=${S3_ENDPOINT}
      - GRAFANA_DATA_DIR=/var/lib/grafana/grafana.db
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_FOLDER=grafana-daily
    volumes:
      - grafana-data:/var/lib/grafana
    deploy:
      mode: replicated
      replicas: 0
      labels:
        - "swarm.cronjob.enable=true"
        - "swarm.cronjob.schedule=0 6 * * *"
        - "swarm.cronjob.skip-running=true"
      restart_policy:
        condition: none

  telegraf:
    image: ghcr.io/${OWNER_NAME}/telegraf:${GIT_COMMIT_SHA}
    hostname: "{{.Node.Hostname}}"
    networks:
      - mongo-rs-net
      - mqtt-net
    environment:
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
      - HOST_ETC=/host/etc
      - MONGO_URL=mongodb://${USERNAME}:${PASSWORD}@mongo-rs-1:27017/?replicaSet=rs0&authSource=admin
      - MQTT_HOST=mqtt
      - MQTT_PORT=1883
      - MQTT_USER=${USERNAME}
      - MQTT_PASSWORD=${PASSWORD}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/host/proc
      - /sys:/host/sys
      - /etc:/host/etc
    deploy:
      mode: global
      restart_policy:
        condition: on-failure

  mqtt:
    image: ghcr.io/${OWNER_NAME}/mqtt:${GIT_COMMIT_SHA}
    ports:
      - target: 8883
        published: 8883
        protocol: tcp
        mode: ingress
    volumes:
      - mqtt-data:/mosquitto/data
      - mqtt-log:/mosquitto/log
      # caddy-data mounted read-only so the entrypoint can read the TLS cert that
      # Caddy provisions and renews for MQTT_TLS_DOMAIN.
      - caddy-data:/caddy_storage:ro
    environment:
      - MQTT_PORT=1883
      - MQTT_TLS_PORT=8883
      - MQTT_TLS_DOMAIN=${MQTT_TLS_DOMAIN}
      - MQTT_ADMIN_USER=${USERNAME}
      - MQTT_ADMIN_PASSWORD=${PASSWORD}
    networks:
      - mqtt-net
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      resources:
        limits:
          memory: 256M

  mqtt-logger:
    image: ghcr.io/${OWNER_NAME}/mqtt-logger:${GIT_COMMIT_SHA}
    environment:
      - MQTT_HOST=mqtt
      - MQTT_PORT=1883
      - MQTT_USER=${USERNAME}
      - MQTT_PASSWORD=${PASSWORD}
      - PGHOST=postgres-1
      - PGPORT=5432
      - PGUSER=${USERNAME}
      - PGPASSWORD=${PASSWORD}
      - PGDATABASE=mqtt_store
    networks:
      - mqtt-net
      - postgres-net
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s

  mqtt-backup-daily:
    image: ghcr.io/${OWNER_NAME}/mqtt-backup:${GIT_COMMIT_SHA}
    command: ["/usr/local/bin/backup.sh"]
    depends_on:
      - cron
      - mqtt
    environment:
      - S3_ENDPOINT=${S3_ENDPOINT}
      - MQTT_DATA_DIR=/mosquitto/data
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_FOLDER=mqtt-daily
    volumes:
      - mqtt-data:/mosquitto/data:ro
    deploy:
      mode: replicated
      replicas: 0
      labels:
        - "swarm.cronjob.enable=true"
        - "swarm.cronjob.schedule=0 4 * * *"
        - "swarm.cronjob.skip-running=true"
      restart_policy:
        condition: none

networks:
  reverse-proxy:
    driver: overlay
    attachable: true
  mongo-rs-net:
    driver: overlay
    attachable: true
    driver_opts:
      encrypted: "true"
  postgres-net:
    driver: overlay
    attachable: true
    driver_opts:
      encrypted: "true"
  mqtt-net:
    driver: overlay
    attachable: true
    driver_opts:
      encrypted: "true"

volumes:
  mongodb-rs-1-data:
  postgres-1-data:
  grafana-data:
  caddy-data:
  mqtt-data:
  mqtt-log:
